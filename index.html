<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --border: #e8eaed;
      --text: #1a1a2e;
      --muted: #6b7280;
      --accent: #6c47ff;
      --accent-light: #f0ecff;
      --header-h: 60px;
      --sidebar-w: 200px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: #12112a;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 32px;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot { color: var(--accent); font-size: 22px; }

    nav.top-nav { display: flex; gap: 4px; }

    .top-nav button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,.6);
      font-size: 13.5px;
      font-weight: 500;
      padding: 7px 15px;
      border-radius: 7px;
      cursor: pointer;
      transition: all .18s;
      font-family: inherit;
    }
    .top-nav button:hover { background: rgba(255,255,255,.1); color: #fff; }
    .top-nav button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h));
    }

    /* ── SIDEBAR ── */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 10px;
      position: fixed;
      top: var(--header-h);
      bottom: 0;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #aab0bd;
      padding: 0 10px;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .sidebar-label:first-child { margin-top: 0; }

    .side-nav button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      color: #374151;
      font-size: 13.5px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      text-align: left;
    }
    .side-nav button:hover { background: var(--accent-light); color: var(--accent); }
    .side-nav button.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .side-nav .count {
      margin-left: auto;
      background: var(--bg);
      color: var(--muted);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 20px;
    }
    .side-nav button.active .count { background: rgba(108,71,255,.15); color: var(--accent); }

    /* ── MAIN ── */
    main {
      margin-left: var(--sidebar-w);
      padding: 32px 32px 48px;
      flex: 1;
    }

    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,.10);
      border-color: var(--accent);
    }

    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .card-tag {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 10.5px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 16px;
    }

    .card-btn {
      display: block;
      text-align: center;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 9px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      transition: background .15s;
    }
    .card-btn:hover { background: #5535e0; }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── SCROLLBAR ── */
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: #dde0e6; border-radius: 4px; }
  </style>
</head>

let activeCat = 'all';
let activeSub = '__all';

function countSub(cat, sub) {
  return SERVICES.filter(s =>
    (cat === 'all' || s.cat === cat) &&
    (sub === '__all' || s.sub === sub)
  ).length;
}

function renderTopNav() {
  document.querySelectorAll('#top-nav button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === activeCat);
  });
}

function renderSideNav() {
  const info = CATS[activeCat];
  const nav = document.getElementById('side-nav');
  nav.innerHTML = info.subs.map(s => {
    const n = countSub(activeCat, s.id);
    return `<button data-sub="${s.id}" class="${activeSub === s.id ? 'active' : ''}">
      ${s.label}<span class="count">${n}</span>
    </button>`;
  }).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => { activeSub = btn.dataset.sub; render(); });
  });
}

    (activeCat === 'all' || s.cat === activeCat) &&
    (activeSub === '__all' || s.sub === activeSub)
  );
  const grid = document.getElementById('cards-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">해당 카테고리에 서비스가 없습니다.</div>';
    return;
  }
  grid.innerHTML = filtered.map(s => `
    <div class="card" onclick="window.open('${s.url}','_blank')">
      <div class="card-icon" style="background:${s.iconBg}">${s.icon}</div>
      <div class="card-name">${s.name}</div>
      <div class="card-tag">${s.tag}</div>
      <div class="card-desc">${s.desc}</div>
      <a class="card-btn" href="${s.url}" target="_blank" rel="noopener"
         onclick="event.stopPropagation()">바로가기 →</a>
    </div>
  `).join('');
}

function renderHeader() {
  const info = CATS[activeCat];
  document.getElementById('page-title').textContent = info.title;
  document.getElementById('page-sub').textContent = info.sub;
}

function render() {
  renderTopNav();
  renderSideNav();
  renderHeader();
  renderCards();
}

document.getElementById('top-nav').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  activeSub = '__all';
  render();
});

render();
</script>
</body>
</html>
